version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: vocational-games-db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: vocational_games_db
    ports:
      - "5432:5432"
    volumes:
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d vocational_games_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: vocational-games-service
    restart: always
    ports:
      - "4000:4000"
    environment:
      PORT: 4000
      NODE_ENV: production
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: vocational_games_db
      JWT_SECRET: super-secret-jwt-key-orientate-plus
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
